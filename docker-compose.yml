version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: transportepro-db
    environment:
      POSTGRES_USER: transportepro
      POSTGRES_PASSWORD: senhaSegura123!
      POSTGRES_DB: transportepro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./back/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transportepro"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transportepro-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://transportepro:senhaSegura123!@postgres:5432/transportepro
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
